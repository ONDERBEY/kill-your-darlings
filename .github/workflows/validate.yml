name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON manifests
        run: |
          python3 - <<'PY'
          import json, sys, pathlib

          errors = []

          def load(path):
              try:
                  return json.loads(pathlib.Path(path).read_text())
              except Exception as e:
                  errors.append(f"{path}: invalid JSON ({e})")
                  return None

          mp = load(".claude-plugin/marketplace.json")
          if mp is not None:
              if not mp.get("name"):
                  errors.append("marketplace.json: missing required 'name'")
              for i, p in enumerate(mp.get("plugins", [])):
                  if not p.get("name"):
                      errors.append(f"marketplace.json plugins[{i}]: missing 'name'")
                  if not p.get("source"):
                      errors.append(f"marketplace.json plugins[{i}]: missing 'source'")

          for plug in pathlib.Path("plugins").glob("*"):
              manifest = plug / ".claude-plugin" / "plugin.json"
              if manifest.exists():
                  m = load(str(manifest))
                  if m is not None and not m.get("name"):
                      errors.append(f"{manifest}: missing required 'name'")

          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print("All manifests valid.")
          PY

      - name: Validate skill frontmatter
        run: |
          fail=0
          while IFS= read -r skill; do
            head -n 10 "$skill" | grep -q '^name:' || { echo "$skill: missing 'name' in frontmatter"; fail=1; }
            head -n 12 "$skill" | grep -q '^description:' || { echo "$skill: missing 'description' in frontmatter"; fail=1; }
          done < <(find plugins -name SKILL.md)
          if [ "$fail" -eq 0 ]; then echo "All SKILL.md frontmatter valid."; fi
          exit $fail
